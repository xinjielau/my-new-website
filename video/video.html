<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频库 - ShePower</title>
    <!-- Relative path to root CSS -->
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    /* Grid: 4 columns for a larger, high-impact look */
    .reel-card-grid {
        display: grid;
        /* Increased min-width from 180px to 250px to make them bigger */
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
        gap: 25px; /* More space between the larger cards */
        margin-top: 30px;
    }

    .reel-card { 
        position: relative; 
        overflow: hidden; 
        aspect-ratio: 9/16; 
        background: #000; 
        border-radius: 20px; 
        cursor: pointer;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    }

    .reel-card:hover { 
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
    }

    .reel-video-container { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
    }

    /* Larger Title for larger cards[cite: 3] */
    .reel-content h3 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;  
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.4;
        font-size: 1.1rem; /* Restored size for better readability[cite: 3] */
        color: white;
        margin: 0;
        text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    }

    .reel-content {
        position: absolute;
        bottom: 20px;
        left: 15px;
        right: 15px;
        z-index: 2;
    }

    /* Video Expand Modal - Fixed to ensure it is hidden by default[cite: 3] */
    .video-modal {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        display: none; /* Stays hidden until 'active' class is added[cite: 3] */
        justify-content: center;
        align-items: center;
        z-index: 9999;
        padding: 20px;
    }
    .video-modal.active { display: flex; }

    /* Desktop forced 4-column split[cite: 3] */
    @media (min-width: 1200px) {
        .reel-card-grid {
            grid-template-columns: repeat(4, 1fr); 
        }
    }
</style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>
    <div class="aura aura-3"></div>

    <!-- Navigation Bar with correct GitHub pathing[cite: 3] -->
    <header class="navbar glass-panel-nav">
        <div class="container nav-container">
            <div class="logo">She<span>Power</span></div>
            <ul class="nav-links">
                <li><a href="../index.html" class="hover-target">首页</a></li>
                <li><a href="../activity/activity.html" class="hover-target">活动</a></li>
                <li><a href="../community-member/member.html" class="hover-target">社区成员</a></li>
                <li><a href="#" class="active hover-target">视频</a></li>
                <li><a href="../merch/merch.html" class="hover-target">周边</a></li>
                <li><a href="../about/about.html" class="hover-target">关于我们</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn hover-target"><i class="fas fa-moon"></i></button>
                <button class="btn-primary hover-target btn-sm-nav join-us-trigger" style="margin-left: 15px;">加入我们 &rarr;</button>
            </div>
        </div>
    </header>

    <section class="video-hero section-padding" style="padding-top: 180px; padding-bottom: 40px;">
        <div class="container text-center">
            <h1 class="fade-in-up">灵感<span class="text-gradient">放映厅</span></h1>
            <div class="filter-tabs fade-in-up" style="margin-top: 30px;">
                <button class="reel-filter-btn active hover-target" onclick="filterVideos('全部')">全部</button>
                <button class="reel-filter-btn hover-target" onclick="filterVideos('创立故事')">创立故事</button>
                <button class="reel-filter-btn hover-target" onclick="filterVideos('一起快乐玩')">一起快乐玩</button>
            </div>
        </div>
    </section>

    <section class="video-grid-section section-padding pt-0">
        <div class="container">
            <div class="reel-card-grid" id="videoContainer"></div>
        </div>
    </section>

    <!-- Modal for Playback[cite: 3] -->
    <div id="video-expand-modal" class="video-modal">
        <div class="video-modal-content">
            <button class="close-video" onclick="closeVideoModal()">&times;</button>
            <video id="expanded-video" controls playsinline><source src="" type="video/mp4"></video>
        </div>
    </div>

    <!-- Modal for Join Us[cite: 1] -->
    <div id="contact-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="close-modal">&times;</button>
            <h2>加入我们 <span>Join Us</span></h2>
            <div class="contact-methods">
                <a href="#" class="contact-item hover-target"><i class="fab fa-instagram"></i> <span>Instagram 联系</span></a>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        let videoData = [];

        // GitHub friendly fetch[cite: 3]
        async function loadVideos() {
            try {
                const response = await fetch('videos.json'); 
                videoData = await response.json();
                displayVideos(videoData);
            } catch (e) {
                console.error("Could not load JSON. Ensure you are using a server or hosting.", e);
            }
        }

        function displayVideos(data) {
            const container = document.getElementById('videoContainer');
            container.innerHTML = data.map((video, index) => `
                <div class="reel-card hover-target fade-in-up visible" onclick="openVideoModal('${video.videoUrl}')" style="transition-delay: ${index * 0.1}s">
                    <video class="reel-video-container" loop muted playsinline preload="metadata">
                        <source src="${video.videoUrl}" type="video/mp4">
                    </video>
                    <div class="reel-play-btn"><i class="fas fa-play"></i></div>
                    <div class="reel-content">
                        <h3>${video.title}</h3>
                    </div>
                </div>
            `).join('');
            setupVideoHover();
        }

        function setupVideoHover() {
            document.querySelectorAll('.reel-card').forEach(card => {
                const video = card.querySelector('video');
                card.addEventListener('mouseenter', () => video.play());
                card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
            });
        }

        function openVideoModal(url) {
            const modal = document.getElementById('video-expand-modal');
            const video = document.getElementById('expanded-video');
            video.src = url;
            modal.classList.add('active');
            video.play();
        }

        function closeVideoModal() {
            const modal = document.getElementById('video-expand-modal');
            const video = document.getElementById('expanded-video');
            modal.classList.remove('active');
            video.pause();
            video.src = "";
        }

        function filterVideos(category) {
            document.querySelectorAll('.reel-filter-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === category));
            const filtered = category === '全部' ? videoData : videoData.filter(v => v.category === category);
            displayVideos(filtered);
        }

        loadVideos();
    </script>

</body>
