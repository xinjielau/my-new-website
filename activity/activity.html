<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动 - ShePower</title>
    
    <link rel="stylesheet" href="activity-styles.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">ShePower</div>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="activity.html" class="active">活动</a></li>
                <li><a href="#">社区成员</a></li>
                <li><a href="#">视频</a></li>
                <li><a href="#">关于我们</a></li>
                <li><a href="#">联系我们</a></li>
            </ul>
            <button class="btn-primary">加入我们 →</button>
        </nav>
    </header>

    <section class="activity-hero">
        <h1>活动</h1>
        <p>参与我们的活动，学习新技能、结识新朋友。</p>
        <div class="filter-tags">
            <button class="tag active">全部</button>
            <button class="tag">工作坊</button>
            <button class="tag">讲座</button>
            <button class="tag">线上活动</button>
        </div>
    </section>

    <section class="activity-grid-section">
        <div class="activity-card-grid">
            <div class="activity-card">
                <div class="card-image">
                    <img src="https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=500" alt="Activity">
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <div class="card-date"><strong>25</strong><span>5月</span></div>
                        <div class="card-title-group">
                            <h3>自信表达工作坊</h3>
                            <p><i class="far fa-clock"></i> 周六 2:00 PM</p>
                            <p><i class="fas fa-map-marker-alt"></i> 线上活动</p>
                        </div>
                    </div>
                    <button class="btn-primary full-width">立即报名</button>
                </div>
            </div>
            </div>
    </section>

</body>
</html>
