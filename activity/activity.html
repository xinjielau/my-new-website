<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动中心 - ShePower</title>
    <link rel="stylesheet" href="activity-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">ShePower</div>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="activity.html" class="active">活动</a></li>
                <li><a href="#">社区成员</a></li>
                <li><a href="#">视频</a></li>
                <li><a href="#">关于我们</a></li>
                <li><a href="#">联系我们</a></li>
            </ul>
            <button class="btn-primary">加入我们 →</button>
        </nav>
    </header>

    <section class="activity-hero">
        <h1>活动中心</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜索活动名称或地点..." onkeyup="filterActivities()">
        </div>
    </section>

    <section class="activity-grid-section">
        <div class="activity-card-grid" id="activityContainer">
            <p>正在加载活动...</p>
        </div>
    </section>

    <script>
        let allActivities = [];

        // Fetch data from JSON
        async function fetchActivities() {
            try {
                const response = await fetch('activities.json');
                allActivities = await response.json();
                renderActivities(allActivities);
            } catch (error) {
                console.error("加载失败:", error);
                document.getElementById('activityContainer').innerHTML = "<p>无法加载活动，请检查 JSON 文件。</p>";
            }
        }

        // Render cards to HTML
        function renderActivities(data) {
            const container = document.getElementById('activityContainer');
            if (data.length === 0) {
                container.innerHTML = "<p>没有找到相关活动。</p>";
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="activity-card">
                    <div class="card-image">
                        <img src="${item.image}" alt="${item.title}">
                    </div>
                    <div class="card-content">
                        <div class="card-header">
                            <div class="card-date"><strong>${item.date}</strong><span>${item.month}</span></div>
                            <div class="card-title-group">
                                <h3>${item.title}</h3>
                                <p><i class="far fa-clock"></i> ${item.time}</p>
                                <p><i class="fas fa-map-marker-alt"></i> ${item.location}</p>
                            </div>
                        </div>
                        <button class="btn-primary full-width">立即报名</button>
                    </div>
                </div>
            `).join('');
        }

        // Simple Search Function
        function filterActivities() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allActivities.filter(act => 
                act.title.toLowerCase().includes(searchTerm) || 
                act.location.toLowerCase().includes(searchTerm)
            );
            renderActivities(filtered);
        }

        fetchActivities();
    </script>
</body>
</html>
