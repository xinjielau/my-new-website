<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - ShePower</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .detail-grid { display: grid; grid-template-columns: 1fr 320px; gap: 40px; margin-top: 30px; }
        
        .detail-reel { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 20px; overflow: hidden; position: sticky; top: 100px; cursor: pointer; transition: transform 0.3s ease; }
        .detail-reel:hover { transform: scale(1.02); }
        .detail-reel video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Gallery: No cropping, variable sizes */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
        .gallery-grid img { width: 100%; height: auto; border-radius: 15px; box-shadow: var(--glass-shadow); }

        /* Video Expand Modal */
        .video-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .video-modal.active { display: flex; }
        .video-modal-content { position: relative; width: 100%; max-width: 450px; aspect-ratio: 9/16; }
        .video-modal video { width: 100%; height: 100%; border-radius: 20px; }
        .close-video { position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 2.5rem; cursor: pointer; }

        /* Keeps cursor above the video modal */
        .cursor-dot, .cursor-outline { z-index: 10001 !important; pointer-events: none; }

        @media (max-width: 992px) { .detail-grid { grid-template-columns: 1fr; } .detail-reel { max-width: 400px; position: static; margin: 30px auto; } }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>
    <div class="aura aura-3"></div>

    <header class="navbar glass-panel-nav">
        <div class="container nav-container">
            <div class="logo">She<span>Power</span></div>
            <ul class="nav-links">
                <li><a href="../index.html" class="hover-target">首页</a></li>
                <li><a href="activity.html" class="active hover-target">活动</a></li>
                <li><a href="../community-member/member.html" class="hover-target">社区成员</a></li>
                <li><a href="../video/video.html" class="hover-target">视频</a></li>
                <li><a href="../merch/merch.html" class="hover-target">周边</a></li>
                <li><a href="../about/about.html" class="hover-target">关于我们</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn hover-target" title="切换主题"><i class="fas fa-moon"></i></button>
                <a href="activity.html" class="btn-outline hover-target" style="margin-left: 15px; text-decoration: none;">&larr; 返回列表</a>
            </div>
        </div>
    </header>

    <div id="detailContainer"></div>

    <!-- Video Modal for Reel Expansion -->
    <div id="video-expand-modal" class="video-modal">
        <div class="video-modal-content">
            <button class="close-video" onclick="closeReel()">&times;</button>
            <video id="expanded-video" controls playsinline><source src="" type="video/mp4"></video>
        </div>
    </div>

    <!-- Restored Contact Modal from about.html -->
    <div id="contact-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="close-modal">&times;</button>
            <h2>加入我们 <span>Join Us</span></h2>
            <p>通过以下方式联系我们，开启你的成长之旅：</p>
            <div class="contact-methods">
                <a href="https://wa.me/0176157314" target="_blank" class="contact-item hover-target">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp: +60 17-615 7314 （Juann）</span>
                </a>
                <a href="https://www.instagram.com/shepower.tribe/?hl=en" target="_blank" class="contact-item hover-target">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram: @shepower.tribe</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Footer[cite: 15] -->
    <footer class="glass-footer">
        <div class="container">
            <div class="footer-nav">
                <div class="f-brand">
                    <div class="logo">She<span>Power</span></div>
                    <p>赋能女性，无限可能</p>
                    <p style="font-size: 0.8rem; margin-top: 10px;">© 2026 保留所有权利。</p>
                </div>
                <div class="f-links">
                    <a href="about/about.html" class="hover-target">关于我们</a>
                    <a href="merch/merch.html" class="hover-target">慈善</a>
                    <a href="community-member/member.html" class="hover-target">认识成员</a>
                </div>
                <div class="f-socials" style="align-items: center;">
                    <a href="https://www.instagram.com/shepower.tribe/?hl=en" class="hover-target" title="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="https://xhslink.com/m/3bpJgKgzVRE" class="hover-target" title="Rednote" style="font-size: 1rem; font-weight: 800; text-decoration: none;">Rednote</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Script must be placed below the footer/modals! -->
    <script src="../script.js"></script>
    <script>
        async function loadDetail() {
            const id = new URLSearchParams(window.location.search).get('id');
            try {
                const response = await fetch('activities.json');
                const activities = await response.json();
                const activity = activities.find(a => a.id === id);
                if (activity) renderHTML(activity);
            } catch (e) { console.error(e); }
        }

        function renderHTML(a) {
            let galHtml = '';
            if (a.gallery && a.gallery.length > 0) {
                galHtml = `
                    <div style="margin-top: 50px;">
                        <h3 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 25px;">活动影集 Gallery</h3>
                        <div class="gallery-grid">
                            ${a.gallery.map(img => `<img src="${img}" alt="Gallery Image" class="hover-target">`).join('')}
                        </div>
                    </div>`;
            }

            document.getElementById('detailContainer').innerHTML = `
                <div class="container" style="padding-top: 150px; padding-bottom: 80px;">
                    <div class="glass-panel" style="max-width: 1100px; margin: 0 auto; padding: 50px;">
                        <h1 style="font-size: 2.8rem; font-weight: 800; margin-bottom: 15px;">${a.title}</h1>
                        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px;">
                            <i class="far fa-calendar-alt"></i> ${a.date}-${a.month}-${a.year} (${a.day}) | <i class="fas fa-map-marker-alt"></i> ${a.location}
                        </p>
                        <div class="detail-grid">
                            <div>
                                <img src="${a.image}" style="width: 100%; height: auto; max-height: 500px; border-radius: 20px; object-fit: cover; margin-bottom: 30px;">
                                <div style="line-height: 1.8; font-size: 1.15rem;">
                                    <h3 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 15px;">关于本次活动</h3>
                                    <p>${a.description}</p>
                                </div>
                            </div>
                            <div class="detail-reel hover-target" onclick="openReel('${a.reel}')">
                                <video loop muted playsinline autoplay><source src="${a.reel}" type="video/mp4"></video>
                                <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2);">
                                    <i class="fas fa-expand" style="color: white; font-size: 2rem; opacity: 0.8;"></i>
                                </div>
                            </div>
                        </div>
                        ${galHtml}
                    </div>
                </div>
            `;
        }

        function openReel(url) {
            const modal = document.getElementById('video-expand-modal');
            const video = document.getElementById('expanded-video');
            video.src = url;
            modal.classList.add('active');
            video.play();
            document.body.style.overflow = 'hidden'; 
        }

        function closeReel() {
            const modal = document.getElementById('video-expand-modal');
            const video = document.getElementById('expanded-video');
            modal.classList.remove('active');
            video.pause();
            video.src = "";
            document.body.style.overflow = 'auto'; 
        }

        window.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('video-expand-modal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeReel();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape") closeReel();
            });
        });

        loadDetail();
    </script>
</body>
</html>
