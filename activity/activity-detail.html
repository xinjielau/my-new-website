<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动详情 - ShePower</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .detail-grid { display: grid; grid-template-columns: 1fr 320px; gap: 40px; margin-top: 30px; }
        
        /* --- NEW: Cinematic Sidebar Reel --- */
        .detail-reel { 
            width: 100%; aspect-ratio: 9/16; background: #111; border-radius: 20px; 
            overflow: hidden; position: sticky; top: 100px; cursor: pointer; 
            box-shadow: var(--glass-shadow); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            perspective: 1000px; /* 3D depth */
        }

        .detail-reel:hover { 
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 46, 147, 0.15); 
            border: 1px solid var(--accent-1);
        }

        /* Blurred Background */
        .vc-img-blur {
            position: absolute; inset: -20px; background-size: cover; background-position: center;
            filter: blur(15px); opacity: 0.5; z-index: 0; transition: all 0.6s ease;
        }

        .detail-reel:hover .vc-img-blur { transform: scale(1.15); opacity: 0.8; }

        /* Actual Thumbnail (No Cropping) */
        .detail-reel img.reel-thumb {
            width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 1;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .detail-reel:hover img.reel-thumb { transform: scale(1.08) translateY(-5px); filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }

        /* Sonar Pulse Animation */
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
        }

        /* Floating Play Button */
        .vc-play-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: rgba(255,255,255,0.25); backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; z-index: 2;
            transition: all 0.4s ease;
        }

        .vc-play-btn::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        .detail-reel:hover .vc-play-btn {
            background: var(--gradient-primary); border-color: transparent; transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 10px 25px rgba(255, 46, 147, 0.4);
        }

        .detail-reel:hover .vc-play-btn::before { border-color: var(--accent-1); }

        /* Gallery */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
        .gallery-grid img { width: 100%; height: auto; border-radius: 15px; box-shadow: var(--glass-shadow); }

        /* Video Expand Modal */
        .video-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
        .video-modal.active { display: flex; opacity: 1; }
        .video-modal-content { position: relative; width: 100%; max-width: 450px; aspect-ratio: 9/16; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .video-modal.active .video-modal-content { transform: scale(1); }
        .video-modal iframe { width: 100%; height: 100%; border-radius: 20px; border: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .close-video { position: absolute; top: -50px; right: 0; background: rgba(255,255,255,0.1); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: none; color: white; font-size: 1.8rem; cursor: pointer; transition: background 0.3s ease; }
        .close-video:hover { background: var(--accent-1); }

        .cursor-dot, .cursor-outline { z-index: 10001 !important; pointer-events: none; }

        @media (max-width: 992px) { .detail-grid { grid-template-columns: 1fr; } .detail-reel { max-width: 400px; position: static; margin: 30px auto; } }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>
    <div class="aura aura-3"></div>

    <header class="navbar glass-panel-nav">
        <div class="container nav-container">
            <div class="logo">She<span>Power</span></div>
            <ul class="nav-links">
                <li><a href="../index.html" class="hover-target">首页</a></li>
                <li><a href="activity.html" class="active hover-target">活动</a></li>
                <li><a href="../community-member/member.html" class="hover-target">社区成员</a></li>
                <li><a href="../video/video.html" class="hover-target">视频</a></li>
                <li><a href="../merch/merch.html" class="hover-target">周边</a></li>
                <li><a href="../about/about.html" class="hover-target">关于我们</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn hover-target" title="切换主题"><i class="fas fa-moon"></i></button>
                <a href="activity.html" class="btn-outline hover-target" style="margin-left: 15px; text-decoration: none;">&larr; 返回列表</a>
            </div>
        </div>
    </header>

    <div id="detailContainer"></div>

    <!-- Video Modal for Reel Expansion -->
    <div id="video-expand-modal" class="video-modal">
        <div class="video-modal-content">
            <button class="close-video hover-target" onclick="closeReel()">&times;</button>
            <iframe id="expanded-video" src="" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contact-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="close-modal">&times;</button>
            <h2>加入我们 <span>Join Us</span></h2>
            <p>通过以下方式联系我们，开启你的成长之旅：</p>
            <div class="contact-methods">
                <a href="https://wa.me/0176157314" target="_blank" class="contact-item hover-target">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp: +60 17-615 7314 （Juann）</span>
                </a>
                <a href="https://www.instagram.com/shepower.tribe/?hl=en" target="_blank" class="contact-item hover-target">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram: @shepower.tribe</span>
                </a>
            </div>
        </div>
    </div>

    <footer class="glass-footer">
        <div class="container">
            <div class="footer-nav">
                <div class="f-brand">
                    <div class="logo">She<span>Power</span></div>
                    <p>赋能女性，无限可能</p>
                    <p style="font-size: 0.8rem; margin-top: 10px;">© 2026 保留所有权利。</p>
                </div>
                <div class="f-links">
                    <a href="../about/about.html" class="hover-target">关于我们</a>
                    <a href="#" class="hover-target">常见问题</a>
                    <a href="#" class="hover-target">加入团队</a>
                </div>
                <div class="f-socials" style="align-items: center;">
                    <a href="#" class="hover-target" title="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="hover-target" title="Rednote" style="font-size: 1rem; font-weight: 800; text-decoration: none;">Rednote</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script>
        async function loadDetail() {
            const id = new URLSearchParams(window.location.search).get('id');
            try {
                const response = await fetch('activities.json');
                const activities = await response.json();
                const activity = activities.find(a => a.id === id);
                if (activity) renderHTML(activity);
            } catch (e) { console.error(e); }
        }

        function getEmbedUrl(url) {
            if (url && url.includes('instagram.com/reel/')) {
                const baseUrl = url.split('?')[0]; 
                return baseUrl.endsWith('/') ? baseUrl + 'embed/' : baseUrl + '/embed/';
            }
            return url;
        }

        function renderHTML(a) {
            let galHtml = '';
            if (a.gallery && a.gallery.length > 0) {
                galHtml = `
                    <div style="margin-top: 50px;">
                        <h3 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 25px;">活动影集 Gallery</h3>
                        <div class="gallery-grid">
                            ${a.gallery.map(img => `<img src="${img}" alt="Gallery Image" class="hover-target">`).join('')}
                        </div>
                    </div>`;
            }

            const embedUrl = getEmbedUrl(a.reel);
            
            // MAGIC TRICK: If no thumbnail is set in activities.json, it falls back to using the main activity image as the video cover!
            const thumbUrl = a.thumbnail ? a.thumbnail : a.image; 

            document.getElementById('detailContainer').innerHTML = `
                <div class="container" style="padding-top: 150px; padding-bottom: 80px;">
                    <div class="glass-panel" style="max-width: 1100px; margin: 0 auto; padding: 50px;">
                        <h1 style="font-size: 2.8rem; font-weight: 800; margin-bottom: 15px;">${a.title}</h1>
                        <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px;">
                            <i class="far fa-calendar-alt"></i> ${a.date}-${a.month}-${a.year} (${a.day}) | <i class="fas fa-map-marker-alt"></i> ${a.location}
                        </p>
                        <div class="detail-grid">
                            <div>
                                <img src="${a.image}" style="width: 100%; height: auto; max-height: 500px; border-radius: 20px; object-fit: cover; margin-bottom: 30px;">
                                <div style="line-height: 1.8; font-size: 1.15rem;">
                                    <h3 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 15px;">关于本次活动</h3>
                                    <p>${a.description}</p>
                                </div>
                            </div>
                            
                            <!-- Updated Interactive Sidebar Reel -->
                            <div class="detail-reel hover-target" onclick="openReel('${embedUrl}')">
                                
                                <div class="vc-img-blur" style="background-image: url('${thumbUrl}');"></div>
                                <img src="${thumbUrl}" class="reel-thumb" alt="Video Thumbnail">
                                
                                <div class="vc-play-btn">
                                    <i class="fas fa-play" style="margin-left: 4px;"></i>
                                </div>

                            </div>
                        </div>
                        ${galHtml}
                    </div>
                </div>
            `;
        }

        function openReel(url) {
            const modal = document.getElementById('video-expand-modal');
            const iframe = document.getElementById('expanded-video');
            iframe.src = url;
            
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
            
            document.body.style.overflow = 'hidden'; 
        }

        function closeReel() {
            const modal = document.getElementById('video-expand-modal');
            const iframe = document.getElementById('expanded-video');
            
            modal.classList.remove('active');
            
            setTimeout(() => {
                modal.style.display = 'none';
                iframe.src = ""; 
            }, 300);
            
            document.body.style.overflow = 'auto'; 
        }

        window.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('video-expand-modal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeReel();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape") closeReel();
            });
        });

        loadDetail();
    </script>
</body>
</html>
