<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* 4-Column Grid[cite: 12] */
        .member-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        @media (min-width: 1200px) {
            .member-card-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* --- NEW: Framed Card Layout --- */
        .framed-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 16px; /* Creates the neat frame around the image */
            display: flex;
            flex-direction: column;
            box-shadow: var(--glass-shadow);
            transition: transform 0.4s ease, border-color 0.4s ease;
            height: 100%;
        }

        .framed-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-1);
        }

        /* Image Wrapper */
        .fc-img-wrapper {
            width: 100%;
            height: 240px; /* Standardizes image height */
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .fc-img-wrapper img {
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .framed-card:hover .fc-img-wrapper img {
            transform: scale(1.05); /* Slight zoom on hover */
        }

        /* Location Badge inside Image */
        .fc-loc {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-main);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Content Area */
        .fc-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .fc-name { font-size: 1.3rem; font-weight: 800; color: var(--text-main); margin-bottom: 2px; }
        .fc-role { font-size: 0.9rem; font-weight: 700; color: var(--accent-1); margin-bottom: 16px; }
        
        .fc-quote { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            line-height: 1.6; 
            font-style: italic; 
            flex-grow: 1; 
            margin-bottom: 20px; 
            padding: 0 10px;
        }

        /* Instagram Button */
        .fc-btn {
            background: var(--bg-base);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .framed-card:hover .fc-btn {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(255, 46, 147, 0.2);
        }

        /* Keeps cursor above the rest */
        .cursor-dot, .cursor-outline { z-index: 10001 !important; pointer-events: none; }
    </style>
</head>
<body>

    <script src="../script.js"></script>
    <script>
        async function loadMembers() {
            try {
                const response = await fetch('members.json');
                const members = await response.json();
                const container = document.getElementById('memberContainer');

                // NEAT FRAMED LAYOUT
                container.innerHTML = members.map((person, index) => `
                    <div class="framed-card hover-target fade-in-up" style="transition-delay: ${index * 0.1}s">
                        
                        <div class="fc-img-wrapper">
                            <img src="${person.image}" alt="${person.name}">
                            <div class="fc-loc">
                                <i class="fas fa-map-marker-alt" style="color: var(--accent-1); margin-right: 4px;"></i> ${person.location}
                            </div>
                        </div>
                        
                        <div class="fc-content">
                            <h3 class="fc-name">${person.name}</h3>
                            <span class="fc-role">${person.role}</span>
                            
                            <p class="fc-quote">
                                <i class="fas fa-quote-left" style="color: var(--accent-1); opacity: 0.5; margin-right: 4px;"></i>
                                ${person.quote}
                            </p>
                            
                            <!-- Instagram Button using igName -->
                            <a href="${person.instagram}" target="_blank" class="fc-btn hover-target">
                                <i class="fab fa-instagram" style="font-size: 1.1rem;"></i> ${person.igName}
                            </a>
                        </div>

                    </div>
                `).join('');
                
                // Re-initialize intersection observers
                const faders = document.querySelectorAll('.fade-in-up');
                const appearOnScroll = new IntersectionObserver(function(entries, observer) {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
                faders.forEach(fader => appearOnScroll.observe(fader));

            } catch (e) {
                console.error("Error loading members:", e);
            }
        }
        loadMembers();
    </script>
</body>
