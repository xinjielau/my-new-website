<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区成员 - ShePower</title>
    <link rel="stylesheet" href="member-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">ShePower</div>
            <ul class="nav-links">
                <li><a href="../index.html">首页</a></li>
                <li><a href="../activity/activity.html">活动</a></li>
                <li><a href="member.html" class="active">社区成员</a></li>
                <li><a href="#">视频</a></li>
                <li><a href="#">关于我们</a></li>
                <li><a href="#">联系我们</a></li>
            </ul>
            <button class="btn-primary">加入我们 →</button>
        </nav>
    </header>

    <section class="member-hero">
        <h1>社区成员</h1>
        <p>加入我们充满活力的社区，认识志同道合的她们。</p>
        
        <div class="stats-row">
            <div class="mini-stat"><strong>10,000+</strong> 成员</div>
            <div class="mini-stat"><strong>200+</strong> 城市</div>
            <div class="mini-stat"><strong>150+</strong> 行业</div>
        </div>
    </section>

    <section class="member-grid-section">
        <div class="member-card-grid" id="memberContainer">
            </div>
        
        <div class="action-footer">
            <button class="btn-primary-large">加入社区，认识更多的她们 →</button>
        </div>
    </section>

    <script>
        async function loadMembers() {
            try {
                const response = await fetch('members.json');
                const members = await response.json();
                const container = document.getElementById('memberContainer');

                container.innerHTML = members.map(person => `
                    <div class="member-card">
                        <div class="profile-pic">
                            <img src="${person.image}" alt="${person.name}">
                        </div>
                        <h3>${person.name}</h3>
                        <p class="role">${person.role}</p>
                        <p class="loc">${person.location}</p>
                        <div class="quote">
                            <i class="fas fa-heart"></i>
                            <p>${person.quote}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Error loading members:", e);
            }
        }
        loadMembers();
    </script>
</body>
</html>
